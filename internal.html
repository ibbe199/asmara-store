<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asmara.Store Internal</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/internal.css" />
</head>
<body class="lang-ar">
  <header class="site-header">
    <div class="logo-wrap">
      <h1 class="logo">Asmara.Store Internal</h1>
      <p class="tagline" id="internalTagline"></p>
    </div>

    <div class="lang-switch">
      <button class="lang-btn" data-lang="ar">عربي</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ti">ትግርኛ</button>
    </div>

    <nav class="main-nav">
      <a href="index.html" id="internalBackHome">الرئيسية</a>
      <a href="blog.html" id="internalBlogLink">البلوق</a>
    </nav>
  </header>

  <main class="container">
    <section class="card login-card">
      <h2 id="internalLoginTitle">دخول داخلي</h2>
      <input type="password" id="internalPassword" placeholder="كلمة المرور" />
      <button id="internalLoginBtn" class="btn">دخول</button>
      <p id="internalLoginMsg"></p>
    </section>

    <section id="internalPanel" style="display:none;">
      <div class="stats-grid">
        <div class="stat-card"><span id="statPending">0</span><small id="statPendingLabel">قيد المراجعة</small></div>
        <div class="stat-card"><span id="statApproved">0</span><small id="statApprovedLabel">مقبولة</small></div>
        <div class="stat-card"><span id="statRejected">0</span><small id="statRejectedLabel">مرفوضة</small></div>
        <div class="stat-card"><span id="statReports">0</span><small id="statReportsLabel">بلاغات</small></div>
      </div>

      <section class="card">
        <h2 id="pendingAdsTitle">الإعلانات المنتظرة</h2>
        <div id="pendingAdsList"></div>
      </section>

      <section class="card">
        <h2 id="reportsTitle">البلاغات</h2>
        <div id="reportsList"></div>
      </section>

      <section class="card">
        <h2 id="agentLogTitle">سجل المراجعة</h2>
        <div id="agentLogList"></div>
      </section>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/cookies.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/internal.js"></script>
</body>
</html>
