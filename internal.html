<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asmara.Store - لوحة الوكيل</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .agent-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 1rem;
        }
        .pending-list {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
        }
        .pending-item {
            border-bottom: 1px solid #eee;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-accept { background: #28a745; color: white; border: none; padding: 0.3rem 1rem; border-radius: 20px; cursor: pointer; }
        .btn-reject { background: #dc3545; color: white; border: none; padding: 0.3rem 1rem; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="agent-container">
        <h1 style="color: var(--primary)">🛡️ لوحة الوكيل</h1>
        <div class="pending-list">
            <h3>⏳ إعلانات تنتظر المراجعة</h3>
            <div id="pendingAdsList">لا توجد إعلانات حالياً</div>
        </div>
    </div>
    <script>
        document.getElementById('pendingAdsList').innerHTML = `
            <div class="pending-item">
                <div><strong>شقة للبيع في أسمرة</strong><br><small>عقارات - $85,000</small></div>
                <div><button class="btn-accept">قبول</button> <button class="btn-reject">رفض</button></div>
            </div>
            <div class="pending-item">
                <div><strong>iPhone 14 Pro</strong><br><small>إلكترونيات - $899</small></div>
                <div><button class="btn-accept">قبول</button> <button class="btn-reject">رفض</button></div>
            </div>
        `;
    </script>
</body>
</html>
