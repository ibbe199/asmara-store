<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asmara.Store Internal</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/internal.css" />
</head>
<body class="lang-ar">
  <header class="site-header">
    <div class="logo">Internal Panel</div>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="ar">عربي</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ti">ትግርኛ</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>دخول داخلي</h2>
      <input type="password" id="internalPassword" placeholder="كلمة المرور" />
      <button id="internalLoginBtn" class="btn">دخول</button>
      <p id="internalLoginMsg"></p>
    </section>

    <section id="internalPanel" style="display:none;">
      <div class="stats-grid">
        <div class="stat-card"><span id="statPending">0</span><small>قيد المراجعة</small></div>
        <div class="stat-card"><span id="statApproved">0</span><small>مقبولة</small></div>
        <div class="stat-card"><span id="statRejected">0</span><small>مرفوضة</small></div>
        <div class="stat-card"><span id="statReports">0</span><small>بلاغات</small></div>
      </div>

      <section class="card">
        <h2>الإعلانات المنتظرة</h2>
        <div id="pendingAdsList"></div>
      </section>

      <section class="card">
        <h2>البلاغات</h2>
        <div id="reportsList"></div>
      </section>

      <section class="card">
        <h2>سجل المراجعة</h2>
        <div id="agentLogList"></div>
      </section>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/cookies.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/internal.js"></script>
</body>
</html>
