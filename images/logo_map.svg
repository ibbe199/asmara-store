<svg xmlns="http://www.w3.org/2000/svg" width="300" height="110" viewBox="0 0 300 110">
    <defs>
        <linearGradient id="goldGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c7a12b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#e6b422;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="blueGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <rect x="0" y="0" width="300" height="110" rx="18" fill="url(#blueGradient4)"/>
    
    <!-- خريطة مبسطة لإريتريا -->
    <path d="M30,40 L45,25 L70,22 L90,30 L100,45 L95,65 L80,80 L55,85 L35,75 L25,60 Z" fill="url(#goldGradient4)" opacity="0.9"/>
    
    <!-- نجمة في موقع أسمرة -->
    <circle cx="60" cy="50" r="4" fill="white"/>
    
    <!-- النص -->
    <text x="115" y="42" font-family="'Cairo', 'Inter', Arial, sans-serif" font-size="24" font-weight="800" fill="white" letter-spacing="1">Asmara.Store</text>
    <text x="115" y="65" font-family="'Cairo', Arial, sans-serif" font-size="13" fill="url(#goldGradient4)" letter-spacing="1">أسمرة.ستور</text>
    <text x="115" y="85" font-family="'Cairo', Arial, sans-serif" font-size="9" fill="#a0c4e8">جسر رقمي يربط المغترب بقلب الوطن</text>
</svg>
