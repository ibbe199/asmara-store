<svg xmlns="http://www.w3.org/2000/svg" width="280" height="100" viewBox="0 0 280 100">
    <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c7a12b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#e6b422;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- الخلفية المستديرة -->
    <rect x="0" y="0" width="280" height="100" rx="16" fill="url(#blueGradient)"/>
    
    <!-- نجمة إريتريا (رمز وطني) -->
    <polygon points="35,18 42,36 62,36 46,48 53,66 35,54 17,66 24,48 8,36 28,36" fill="url(#goldGradient)"/>
    
    <!-- النص العربي -->
    <text x="75" y="38" font-family="'Cairo', 'Tajawal', Arial, sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="1">أسمرة.ستور</text>
    
    <!-- النص الإنجليزي -->
    <text x="75" y="62" font-family="'Inter', Arial, sans-serif" font-size="14" font-weight="600" fill="url(#goldGradient)" letter-spacing="1.5">ASMARA.STORE</text>
    
    <!-- الشعار السفلي -->
    <text x="75" y="82" font-family="'Cairo', 'Inter', Arial, sans-serif" font-size="9" fill="#a0c4e8" opacity="0.8">جسر رقمي يربط المغترب بقلب الوطن</text>
</svg>
