<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asmara.Store Smoke Test</title>
  <link rel="stylesheet" href="./assets/css/refactor.css" />
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/forms.css" />
  <link rel="stylesheet" href="./assets/css/responsive.css" />
</head>
<body class="lang-en">
  <main class="container">
    <section class="hero">
      <h1>Asmara.Store Smoke Test</h1>
      <p class="tagline">Minimal runtime verification for the external architecture.</p>
      <p id="homeIntro">This page confirms the CSS stack, JS stack, integration helper, and legacy sync hook can all load together.</p>
    </section>

    <section class="grid-2">
      <article class="card">
        <h3>Runtime</h3>
        <div id="runtimeBox" class="chat-message">Loading…</div>
      </article>
      <article class="card">
        <h3>Integration Helper</h3>
        <div id="integrationBox" class="chat-message">Loading…</div>
      </article>
    </section>

    <section class="grid-2">
      <article class="card">
        <h3>Legacy Sync Result</h3>
        <div id="syncBox" class="chat-message">Loading…</div>
      </article>
      <article class="card">
        <h3>Manifest Files</h3>
        <div id="manifestBox" class="chat-message">Loading…</div>
      </article>
    </section>
  </main>

  <script src="./assets/js/loader-manifest-extended.js"></script>
  <script src="./assets/js/bootstrap.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/core/state.js"></script>
  <script src="./assets/js/core/utils.js"></script>
  <script src="./assets/js/data/mock-content.js"></script>
  <script src="./assets/js/ui/render.js"></script>
  <script src="./assets/js/features/cart.js"></script>
  <script src="./assets/js/features/auth.js"></script>
  <script src="./assets/js/features/messaging.js"></script>
  <script src="./assets/js/features/ratings.js"></script>
  <script src="./assets/js/features/flights.js"></script>
  <script src="./assets/js/features/search.js"></script>
  <script src="./assets/js/features/tabs.js"></script>
  <script src="./assets/js/features/wallet.js"></script>
  <script src="./assets/js/features/modals.js"></script>
  <script src="./assets/js/features/blog.js"></script>
  <script src="./assets/js/legacy-bridge.js"></script>
  <script src="./assets/js/integrate-legacy.js"></script>
  <script src="./assets/js/legacy-sync-hook.js"></script>
  <script src="./assets/js/runtime.js"></script>
  <script src="./assets/js/app-entry.js"></script>
  <script src="./assets/js/app-entry-extended.js"></script>
  <script src="./assets/js/wire-external-stack.js"></script>
  <script>
    window.currentLang = 'en';
    window.currentUser = 'smoke-user';
    window.currentRole = 'user';
    window.isVerified = true;
    window.isAgentMode = false;
    window.balance = 15;
    window.transactions = [{ type: 'Seed', amount: '+$15' }];
    window.messages = [{ text: 'Smoke hello' }];
    window.ratings = [{ rating: 5, comment: 'Smoke ok' }];
    window.cart = [{ id: 1, name: 'Smoke Item', price: 10 }];

    function show(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = '<pre style="white-space:pre-wrap;margin:0;">' + JSON.stringify(value, null, 2) + '</pre>';
    }

    document.addEventListener('DOMContentLoaded', function () {
      if (window.AsmaraStoreLegacySyncHook) {
        window.__asmaraLegacySyncResult = window.AsmaraStoreLegacySyncHook.run();
      }
      show('runtimeBox', window.AsmaraStoreRuntime ? window.AsmaraStoreRuntime.boot() : { ready: false });
      show('integrationBox', window.AsmaraStoreIntegrateLegacy ? window.AsmaraStoreIntegrateLegacy.describe() : { ok: false });
      show('syncBox', window.__asmaraLegacySyncResult || null);
      show('manifestBox', window.AsmaraStoreWireExternalStack ? window.AsmaraStoreWireExternalStack.describe() : null);
    });
  </script>
</body>
</html>
