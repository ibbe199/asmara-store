<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Ad | Asmara Store</title>
  <link rel="stylesheet" href="/frontend/styles/header.css" />
  <style>
    :root {
      --primary: #ea580c;
      --secondary: #f59e0b;
      --text: #292524;
      --muted: #78716c;
      --surface: #ffffff;
      --bg: #fafaf9;
      --border: #e7e5e4;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    .page { max-width: 980px; margin: 0 auto; padding: 28px 18px 60px; }
    .hero { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border-radius: 26px; padding: 34px; margin-bottom: 22px; }
    .hero h1 { margin: 0 0 8px; font-size: 34px; }
    .hero p { margin: 0; opacity: .92; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 22px; box-shadow: 0 12px 32px rgba(41,37,36,.08); }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    label { font-size: 14px; font-weight: 700; color: var(--text); }
    input, select, textarea { width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 12px 13px; font-size: 15px; background: #fff; color: var(--text); }
    textarea { min-height: 120px; resize: vertical; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(234,88,12,.12); }
    .actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
    .btn { border: 0; border-radius: 999px; padding: 12px 20px; font-weight: 800; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #fff7ed; color: var(--primary); border: 1px solid #fed7aa; }
    .status { margin-top: 14px; padding: 12px; border-radius: 14px; display: none; }
    .status.success { display: block; background: #dcfce7; color: #166534; }
    .status.error { display: block; background: #fee2e2; color: #991b1b; }
    .hint { color: var(--muted); font-size: 13px; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } .hero h1 { font-size: 26px; } }
  </style>
</head>
<body>
  <header class="site-header" dir="auto">
    <div class="header-top">
      <a class="brand" href="/" aria-label="Asmara Store Home">
        <span class="brand-mark">AS</span>
        <span class="brand-text"><strong>Asmara Store</strong><small>Marketplace</small></span>
      </a>
      <form class="header-search" action="/" role="search">
        <input type="search" name="q" placeholder="Search products, cars, homes..." aria-label="Search" />
        <button type="submit">Search</button>
      </form>
      <div class="header-actions">
        <a class="header-icon-link" href="/index.html">Home</a>
        <a class="header-icon-link" href="/messages.html">Messages</a>
        <a class="post-ad-button" href="/post-ad.html">Post Ad</a>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1>Post a new listing</h1>
      <p>Add your product, service, job, car, or property to Asmara Store.</p>
    </section>

    <section class="card">
      <form id="postAdForm">
        <div class="grid">
          <div class="field">
            <label for="title">Title</label>
            <input id="title" name="title" required placeholder="Toyota Corolla 2010" />
          </div>
          <div class="field">
            <label for="price">Price USD</label>
            <input id="price" name="price" type="number" min="0" required placeholder="5200" />
          </div>
          <div class="field">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="">Select category</option>
              <option>Vehicles</option>
              <option>Real Estate</option>
              <option>Electronics</option>
              <option>Furniture</option>
              <option>Jobs</option>
              <option>Services</option>
              <option>Baby Items</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label for="city">City</label>
            <select id="city" name="city" required>
              <option value="">Select city</option>
              <option>Asmara</option>
              <option>Massawa</option>
              <option>Keren</option>
              <option>Mendefera</option>
              <option>Assab</option>
              <option>Tessenei</option>
              <option>Nakfa</option>
              <option>Adi Keih</option>
              <option>Dekemhare</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="image">Image URL</label>
          <input id="image" name="image" type="url" placeholder="https://example.com/photo.jpg" />
          <span class="hint">For now, use an image URL. File upload can be added later.</span>
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" name="description" required placeholder="Describe the condition, location, contact preference, and important details..."></textarea>
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Publish Listing</button>
          <a class="btn btn-secondary" href="/index.html">Back Home</a>
        </div>
        <div id="status" class="status"></div>
      </form>
    </section>
  </main>

  <script src="/frontend/scripts/api-client.js"></script>
  <script>
    const form = document.getElementById('postAdForm');
    const statusBox = document.getElementById('status');

    function showStatus(type, message) {
      statusBox.className = `status ${type}`;
      statusBox.textContent = message;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(form).entries());

      try {
        const listing = await window.AsmaraAPI.auth.me().then(() => window.AsmaraAPI ? null : null).catch(() => {
          throw new Error('Please login first before publishing a listing.');
        });

        const response = await fetch('/api/listings', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${localStorage.getItem('asmara_auth_token') || ''}`,
          },
          body: JSON.stringify(payload),
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Could not publish listing');

        showStatus('success', 'Listing published successfully!');
        form.reset();
        setTimeout(() => { window.location.href = '/index.html'; }, 900);
      } catch (error) {
        showStatus('error', error.message);
      }
    });
  </script>
</body>
</html>
