<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asmara.Store</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/public.css" />
</head>
<body class="lang-ar">
  <header class="site-header">
    <div class="logo">ER Asmara.Store</div>
    <div class="tagline" id="tagline"></div>

    <div class="lang-switch">
      <button class="lang-btn" data-lang="ar">عربي</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ti">ትግርኛ</button>
    </div>

    <nav class="main-nav">
      <a href="#" data-tab="home" class="nav-link active">الرئيسية</a>
      <a href="#" data-tab="flight" class="nav-link">الطيران</a>
      <a href="#" data-tab="realestate" class="nav-link">العقارات</a>
      <a href="#" data-tab="electronics" class="nav-link">الإلكترونيات</a>
      <a href="#" data-tab="cars" class="nav-link">السيارات</a>
      <a href="#" data-tab="jobs" class="nav-link">الوظائف</a>
      <a href="#" data-tab="about" class="nav-link">من نحن</a>
      <a href="#" data-tab="privacy" class="nav-link">الخصوصية</a>
    </nav>
  </header>

  <main class="container">
    <section id="homePane" class="tab-pane active-pane">
      <div class="card">
        <h2>Asmara.Store</h2>
        <p id="homeIntro"></p>
      </div>
    </section>

    <section id="flightPane" class="tab-pane">
      <div class="card">
        <h2 id="flightTitle">البحث عن رحلة</h2>
        <select id="flightFrom">
          <option value="DXB">دبي</option>
          <option value="JED">جدة</option>
          <option value="CAI">القاهرة</option>
          <option value="ADD">أديس أبابا</option>
        </select>
        <input type="date" id="flightDate" />
        <button id="searchFlightBtn" class="btn">بحث</button>
        <div id="flightResults"></div>
      </div>
    </section>

    <section id="realestatePane" class="tab-pane">
      <div class="card">
        <h2>العقارات</h2>
        <div id="realEstateGallery" class="gallery-grid"></div>
      </div>
    </section>

    <section id="electronicsPane" class="tab-pane">
      <div class="card">
        <h2>الإلكترونيات</h2>
        <div id="electronicsGallery" class="gallery-grid"></div>
      </div>
    </section>

    <section id="carsPane" class="tab-pane">
      <div class="card">
        <h2>السيارات</h2>
        <div id="carsGallery" class="gallery-grid"></div>
      </div>
    </section>

    <section id="jobsPane" class="tab-pane">
      <div class="card">
        <h2>الوظائف</h2>
        <div id="jobsGallery" class="gallery-grid"></div>
      </div>
    </section>

    <section id="aboutPane" class="tab-pane">
      <div class="card">
        <h2 id="aboutTitle"></h2>
        <p id="aboutText"></p>
        <a href="https://wa.me/29170000000" target="_blank" id="aboutWhatsapp" class="btn-link"></a>
      </div>
    </section>

    <section id="privacyPane" class="tab-pane">
      <div class="card">
        <h2 id="privacyTitle"></h2>
        <p id="privacyText"></p>
        <a href="https://wa.me/29170000000" target="_blank" id="privacyWhatsapp" class="btn-link"></a>
      </div>
    </section>
  </main>

  <a href="https://wa.me/29170000000" target="_blank" id="floatingWhatsapp" class="floating-btn whatsapp-btn"></a>
  <a href="internal.html" id="floatingAgent" class="floating-btn agent-btn"></a>

  <div id="cookieBanner" class="cookie-banner">
    <span id="cookieText"></span>
    <button id="cookieAcceptBtn"></button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/cookies.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/public.js"></script>
</body>
</html>
