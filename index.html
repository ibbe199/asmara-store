<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asmara.Store | المتجر الأول في إريتريا</title>
    
    <!-- الروابط الخارجية: الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #1e3a5f;
            --secondary-color: #c7a12b;
            --light-bg: #f4f7f9;
            --white: #ffffff;
            --text-dark: #1a2a3f;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', 'Inter', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* تنسيق الهيدر (Navigation) */
        header {
            background: linear-gradient(135deg, var(--primary-color), #2c5282);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo { font-size: 1.8rem; font-weight: 900; color: var(--secondary-color); cursor: pointer; }
        
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 15px;
            border-radius: 20px;
            transition: var(--transition);
            cursor: pointer;
        }

        nav ul li a:hover, nav ul li a.active {
            background: var(--secondary-color);
            color: var(--primary-color);
        }

        /* سلة التسوق واللغة */
        .nav-tools { display: flex; align-items: center; gap: 20px; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.4rem; }
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--secondary-color);
            color: var(--primary-color);
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
        }

        /* الأقسام (Tabs Content) */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .tab-content { display: none; animation: fadeInUp 0.5s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* بطاقات المنتجات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: var(--transition);
            border: 1px solid #eee;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
        .card-price { color: var(--secondary-color); font-weight: 800; font-size: 1.2rem; }
        .btn-buy {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 600;
        }

        /* سلة التسوق الجانبية */
        .cart-sidebar {
            position: fixed;
            top: 0;
            left: -400px; /* للغة العربية يفتح من اليسار */
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            z-index: 2000;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }
        .cart-sidebar.open { left: 0; }
        .cart-header { background: var(--primary-color); color: white; padding: 20px; display: flex; justify-content: space-between; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1500;
        }

        /* التجاوب مع الجوال */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; }
            nav ul { flex-wrap: wrap; justify-content: center; }
            .cart-sidebar { width: 100%; left: -100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="switchTab('home')">Asmara.Store</div>
        <nav>
            <ul>
                <li><a onclick="switchTab('home')" class="nav-link active" id="btn-home">الرئيسية</a></li>
                <li><a onclick="switchTab('flights')" class="nav-link" id="btn-flights">الطيران</a></li>
                <li><a onclick="switchTab('realestate')" class="nav-link" id="btn-realestate">العقارات</a></li>
                <li><a onclick="switchTab('electronics')" class="nav-link" id="btn-electronics">الإلكترونيات</a></li>
            </ul>
        </nav>
        <div class="nav-tools">
            <select id="langSwitcher" onchange="changeLanguage()" style="padding: 5px; border-radius: 5px;">
                <option value="ar">العربية</option>
                <option value="en">English</option>
            </select>
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-badge" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <!-- سلة التسوق -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>سلة التسوق</h3>
            <i class="fas fa-times" style="cursor:pointer" onclick="toggleCart()"></i>
        </div>
        <div id="cartItems" style="padding: 20px; flex-grow: 1; overflow-y: auto;">
            <!-- العناصر تظهر هنا -->
        </div>
        <div style="padding: 20px; border-top: 1px solid #eee;">
            <h4>الإجمالي: <span id="cartTotal">0</span>$</h4>
            <button class="btn-buy" style="background: var(--secondary-color); color: var(--primary-color);">إتمام الطلب</button>
        </div>
    </div>

    <div class="container">
        <!-- الصفحة الرئيسية -->
        <section id="home" class="tab-content active">
            <h2 style="text-align: center; margin-bottom: 30px;">مرحباً بكم في Asmara.Store</h2>
            <div class="grid" id="homeGrid"></div>
        </section>

        <!-- صفحة الطيران -->
        <section id="flights" class="tab-content">
            <h2>✈️ حجز تذاكر الطيران إلى أسمرا</h2>
            <div class="grid" id="flightsGrid"></div>
        </section>

        <!-- صفحة العقارات -->
        <section id="realestate" class="tab-content">
            <h2>🏠 العقارات المتاحة</h2>
            <div class="grid" id="reGrid"></div>
        </section>

        <!-- صفحة الإلكترونيات -->
        <section id="electronics" class="tab-content">
            <h2>📱 أحدث الأجهزة الإلكترونية</h2>
            <div class="grid" id="elecGrid"></div>
        </section>
    </div>

    <script>
        // قاعدة البيانات التجريبية
        const products = [
            { id: 1, name: "آيفون 15 برو", price: 1200, category: "electronics", img: "https://images.unsplash.com/photo-1696446701796-da61225697cc?w=400" },
            { id: 2, name: "فيلا في حي تيرفولو", price: 450000, category: "realestate", img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=400" },
            { id: 3, name: "تذكرة دبي - أسمرا", price: 550, category: "flights", img: "https://images.unsplash.com/photo-1436491865332-7a61a109c0f3?w=400" },
            { id: 4, name: "لابتوب ماك بوك", price: 1500, category: "electronics", img: "https://images.unsplash.com/photo-1517336714460-d1b16da02970?w=400" }
        ];

        let cart = [];

        // وظيفة التبديل بين الأقسام
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            
            renderProducts(tabId);
        }

        // عرض المنتجات بناءً على القسم
        function renderProducts(tabId) {
            let filtered = tabId === 'home' ? products : products.filter(p => p.category === tabId);
            let gridId = tabId === 'home' ? 'homeGrid' : tabId === 'flights' ? 'flightsGrid' : tabId === 'realestate' ? 'reGrid' : 'elecGrid';
            
            const grid = document.getElementById(gridId);
            if (!grid) return;
            
            grid.innerHTML = filtered.map(p => `
                <div class="card">
                    <img src="${p.img}" class="card-img">
                    <div class="card-body">
                        <div class="card-title">${p.name}</div>
                        <div class="card-price">${p.price}$</div>
                        <button class="btn-buy" onclick="addToCart(${p.id})">إضافة للسلة</button>
                    </div>
                </div>
            `).join('');
        }

        // سلة التسوق
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
            const overlay = document.getElementById('overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const itemsContainer = document.getElementById('cartItems');
            const totalContainer = document.getElementById('cartTotal');
            
            let total = 0;
            itemsContainer.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:5px;">
                        <span>${item.name}</span>
                        <b>${item.price}$</b>
                        <i class="fas fa-trash" style="color:red; cursor:pointer" onclick="removeFromCart(${index})"></i>
                    </div>
                `;
            }).join('');
            totalContainer.innerText = total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        // تغيير اللغة (تبسيط)
        function changeLanguage() {
            const lang = document.getElementById('langSwitcher').value;
            document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
            // هنا يمكنك إضافة نصوص الترجمة لتبديل العناوين
        }

        // التشغيل عند التحميل
        window.onload = () => renderProducts('home');

    </script>
</body>
</html>
