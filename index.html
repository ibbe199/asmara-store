<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asmara Store | أسمرة ستور</title>
    <!-- استدعاء المكتبات مباشرة لضمان عدم وجود أخطاء Build -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .amazon-gradient { background: linear-gradient(to bottom, #1a365d, #131921); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="app">
        <!-- Header (Amazon Style) -->
        <header class="bg-[#131921] text-white p-3 flex items-center gap-4 sticky top-0 z-50">
            <div class="font-black italic text-xl px-2">asmara<span class="text-[#febd69]">.store</span></div>
            <div class="flex-1 flex bg-white rounded-md overflow-hidden h-10 border-2 border-transparent focus-within:border-[#febd69]">
                <input type="text" id="searchInput" class="flex-1 px-4 text-black text-sm outline-none font-bold" placeholder="ابحث عن منزل، تذكرة طيران، أو وثيقة...">
                <button class="bg-[#febd69] px-5 text-black hover:bg-[#f3a847] transition-colors">
                    <i data-lucide="search" stroke-width="3"></i>
                </button>
            </div>
            <!-- Language Switcher -->
            <button onclick="toggleLang()" class="flex items-center gap-1 text-xs font-bold border border-gray-500 px-3 py-1 rounded hover:bg-gray-800">
                <i data-lucide="globe" size="16"></i> <span id="langText">AR / EN / TI</span>
            </button>
        </header>

        <!-- Hero Section -->
        <section class="amazon-gradient text-white py-12 px-6 text-center border-b-4 border-[#febd69]">
            <h1 id="mainTitle" class="text-4xl md:text-5xl font-black tracking-tighter mb-4">رحلات الطيران المباشرة إلى أسمرة</h1>
            <div id="navLinks" class="flex justify-center gap-6 text-[10px] font-black uppercase tracking-widest opacity-70">
                <span>الرئيسية</span> <span>الرحلات</span> <span>العقارات</span> <span>الصحافة</span>
            </div>
        </section>

        <!-- Flights Grid -->
        <main class="max-w-6xl mx-auto -mt-10 px-4 grid grid-cols-1 md:grid-cols-3 gap-6 pb-12" id="flightsGrid">
            <!-- سيتم توليد البطاقات بواسطة JavaScript -->
        </main>

        <footer class="py-10 text-center text-[9px] font-bold text-gray-400 tracking-[0.3em] uppercase border-t border-gray-200">
            Verified by Asmara Store Agent • 2026
        </footer>
    </div>

    <script>
        // بيانات اللغات
        const translations = {
            ar: {
                title: "رحلات الطيران المباشرة إلى أسمرة",
                search: "ابحث عن منزل، تذكرة طيران، أو وثيقة...",
                nav: ["الرئيسية", "الرحلات", "العقارات", "الصحافة"],
                book: "حجز الآن",
                status: "منضبطة",
                carrier: "ناقل أساسي"
            },
            en: {
                title: "Direct Flights to Asmara",
                search: "Search for a house, flight, or document...",
                nav: ["Home", "Flights", "Real Estate", "Press"],
                book: "Book Now",
                status: "On Schedule",
                carrier: "Main Carrier"
            },
            ti: {
                title: "ናይ ነፋሪት ጉዕዞ ናብ ኣስማራ",
                search: "ገዛ፡ ቲኬት ነፋሪት ወይ ሰነድ ድለ...",
                nav: ["መበገሲ", "ጉዕዞታት", "ቤትታትን ወፈርን", "ጋዜጣታት"],
                book: "ሕጂ ባልዮ",
                status: "ከምቲ ዝተባህሎ",
                carrier: "ቀንዲ መጓዓዝያ"
            }
        };

        let currentLang = 'ar';

        const flights = [
            { name: "Turkish Airlines", route: "IST ➜ ASM", price: "750", main: false },
            { name: "Ethiopian Airlines", route: "ADD ➜ ASM", price: "290", main: true },
            { name: "FlyDubai", route: "DXB ➜ ASM", price: "410", main: false }
        ];

        function render() {
            const t = translations[currentLang];
            document.documentElement.dir = currentLang === 'en' ? 'ltr' : 'rtl';
            document.getElementById('mainTitle').innerText = t.title;
            document.getElementById('searchInput').placeholder = t.search;
            
            // تحديث البطاقات
            const grid = document.getElementById('flightsGrid');
            grid.innerHTML = flights.map(f => `
                <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-6 hover:shadow-2xl transition-all group">
                    <div class="flex justify-between mb-4">
                        <i data-lucide="plane" class="${currentLang === 'en' ? '-rotate-45' : 'rotate-135'} text-blue-600"></i>
                        ${f.main ? `<span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded uppercase">${t.carrier}</span>` : ''}
                    </div>
                    <h3 class="text-lg font-black text-slate-800">${f.name}</h3>
                    <p class="text-xs font-bold text-gray-400 mb-4">${f.route}</p>
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-1 text-[#2d8b49] text-[11px] font-black">
                            <i data-lucide="shield-check" size="14"></i> ${t.status}
                        </div>
                        <div class="text-xl font-black text-[#B12704]">$${f.price}</div>
                    </div>
                    <button class="w-full bg-[#1a365d] text-white py-3 rounded-xl font-black text-xs flex items-center justify-center gap-2 hover:bg-[#febd69] hover:text-black transition-all">
                        ${t.book} <i data-lucide="arrow-up-right" size="16"></i>
                    </button>
                </div>
            `).join('');
            
            // إعادة تشغيل الأيقونات
            lucide.createIcons();
        }

        function toggleLang() {
            const langs = ['ar', 'en', 'ti'];
            let idx = langs.indexOf(currentLang);
            currentLang = langs[(idx + 1) % 3];
            render();
        }

        // البداية
        render();
    </script>
</body>
</html>
