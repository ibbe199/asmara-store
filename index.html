<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asmara.Store</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/public.css" />
</head>
<body class="lang-ar">
  <header class="site-header">
    <div class="logo-wrap">
      <h1 class="logo">Asmara.Store</h1>
      <p id="tagline" class="tagline"></p>
    </div>

    <div class="lang-switch">
      <button class="lang-btn" data-lang="ar">عربي</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ti">ትግርኛ</button>
    </div>

    <nav class="main-nav">
      <a href="#" class="nav-link active" data-tab="home" id="navHome">الرئيسية</a>
      <a href="#" class="nav-link" data-tab="flight" id="navFlight">الطيران</a>
      <a href="#" class="nav-link" data-tab="realestate" id="navRealEstate">العقارات</a>
      <a href="#" class="nav-link" data-tab="electronics" id="navElectronics">الإلكترونيات</a>
      <a href="#" class="nav-link" data-tab="cars" id="navCars">السيارات</a>
      <a href="#" class="nav-link" data-tab="jobs" id="navJobs">الوظائف</a>
      <a href="blog.html" id="navBlog">البلوق</a>
      <a href="#" class="nav-link" data-tab="about" id="navAbout">من نحن</a>
      <a href="#" class="nav-link" data-tab="privacy" id="navPrivacy">الخصوصية</a>
    </nav>
  </header>

  <main class="container">
    <section id="homePane" class="tab-pane active-pane">
      <div class="card hero-card">
        <h2>🇪🇷 Asmara.Store</h2>
        <p id="homeIntro"></p>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3 id="homeFlightsTitle">أحدث الرحلات</h3>
          <div id="homeFlightsPreview"></div>
        </div>
        <div class="card">
          <h3 id="homeBlogTitle">آخر المقالات</h3>
          <div id="homeBlogPreview"></div>
        </div>
      </div>
    </section>

    <section id="flightPane" class="tab-pane">
      <div class="card">
        <h2 id="flightTitle">البحث عن رحلة</h2>
        <select id="flightFrom">
          <option value="DXB">دبي</option>
          <option value="JED">جدة</option>
          <option value="CAI">القاهرة</option>
          <option value="ADD">أديس أبابا</option>
        </select>
        <input type="date" id="flightDate" />
        <button class="btn" id="searchFlightBtn">بحث</button>
        <div id="flightResults" class="results-box"></div>
      </div>
    </section>

    <section id="realestatePane" class="tab-pane">
      <div class="card">
        <h2 id="realestateTitle">العقارات</h2>
        <div id="realEstateGallery" class="gallery-grid"></div>
      </div>
    </section>

    <section id="electronicsPane" class="tab-pane">
      <div class="card">
        <h2 id="electronicsTitle">الإلكترونيات</h2>
        <div id="electronicsGallery" class="gallery-grid"></div>
      </div>
    </section>

    <section id="carsPane" class="tab-pane">
      <div class="card">
        <h2 id="carsTitle">السيارات</h2>
        <div id="carsGallery" class="gallery-grid"></div>
      </div>
    </section>

    <section id="jobsPane" class="tab-pane">
      <div class="card">
        <h2 id="jobsTitle">الوظائف</h2>
        <div id="jobsGallery" class="gallery-grid"></div>
      </div>
    </section>

    <section id="aboutPane" class="tab-pane">
      <div class="card">
        <h2 id="aboutTitle"></h2>
        <p id="aboutText"></p>
        <a id="aboutWhatsapp" class="btn-link" target="_blank"></a>
      </div>
    </section>

    <section id="privacyPane" class="tab-pane">
      <div class="card">
        <h2 id="privacyTitle"></h2>
        <p id="privacyText"></p>
        <a id="privacyWhatsapp" class="btn-link" target="_blank"></a>
      </div>
    </section>
  </main>

  <a id="floatingWhatsapp" class="floating-btn whatsapp-btn" target="_blank"></a>
  <a id="floatingAgent" class="floating-btn agent-btn" href="internal.html"></a>

  <div id="cookieBanner" class="cookie-banner">
    <span id="cookieText"></span>
    <button id="cookieAcceptBtn"></button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/cookies.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/public.js"></script>
</body>
</html>
