<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
    <defs>
        <linearGradient id="pendingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffc107;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#e6a800;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="300" height="200" rx="12" fill="#fff8e1"/>
    <rect width="300" height="50" rx="12" fill="url(#pendingGrad)"/>
    <text x="150" y="32" text-anchor="middle" font-family="'Cairo', Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">⏳ قيد المراجعة</text>
    <text x="150" y="100" text-anchor="middle" font-family="'Cairo', Arial, sans-serif" font-size="12" fill="#6c757d">سيتم مراجعة الإعلان من قبل</text>
    <text x="150" y="120" text-anchor="middle" font-family="'Cairo', Arial, sans-serif" font-size="12" fill="#6c757d">الوكيل خلال 24 ساعة</text>
    <circle cx="150" cy="160" r="16" fill="none" stroke="#ffc107" stroke-width="3" stroke-dasharray="80 80">
        <animateTransform attributeName="transform" type="rotate" from="0 150 160" to="360 150 160" dur="2s" repeatCount="indefinite"/>
    </circle>
</svg>
