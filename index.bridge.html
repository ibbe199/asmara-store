<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asmara.Store Legacy Bridge Test</title>
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/forms.css" />
  <link rel="stylesheet" href="./assets/css/responsive.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>Asmara.Store Legacy Bridge</h1>
      <p class="tagline">Testing the migration bridge between legacy globals and external state.</p>
    </section>

    <section class="grid-2">
      <article class="card">
        <h3>Legacy globals snapshot</h3>
        <div id="legacySnapshot" class="chat-message">Waiting…</div>
      </article>
      <article class="card">
        <h3>External state snapshot</h3>
        <div id="stateSnapshot" class="chat-message">Waiting…</div>
      </article>
    </section>

    <section class="card">
      <h3>Actions</h3>
      <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
        <button class="btn-sm" id="seedLegacyBtn">Seed legacy globals</button>
        <button class="btn-sm" id="syncBridgeBtn">Run bridge sync</button>
      </div>
    </section>
  </main>

  <script src="./assets/js/core/state.js"></script>
  <script src="./assets/js/legacy-bridge.js"></script>
  <script>
    function renderBox(id, data) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = '<pre style="white-space:pre-wrap;margin:0;">' + JSON.stringify(data, null, 2) + '</pre>';
    }

    function snapshotLegacy() {
      return {
        currentLang: window.currentLang ?? null,
        currentUser: window.currentUser ?? null,
        currentRole: window.currentRole ?? null,
        isVerified: window.isVerified ?? null,
        isAgentMode: window.isAgentMode ?? null,
        balance: window.balance ?? null,
        cart: Array.isArray(window.cart) ? window.cart.length : null,
        messages: Array.isArray(window.messages) ? window.messages.length : null,
        ratings: Array.isArray(window.ratings) ? window.ratings.length : null,
        transactions: Array.isArray(window.transactions) ? window.transactions.length : null
      };
    }

    function refreshSnapshots() {
      renderBox('legacySnapshot', snapshotLegacy());
      renderBox('stateSnapshot', window.AsmaraStoreState || {});
    }

    document.getElementById('seedLegacyBtn').addEventListener('click', function () {
      window.currentLang = 'en';
      window.currentUser = 'demo-user';
      window.currentRole = 'user';
      window.isVerified = true;
      window.isAgentMode = false;
      window.balance = 50;
      window.cart = [{ id: 1, name: 'Demo item', price: 25 }];
      window.messages = [{ text: 'Hello' }, { text: 'Need help' }];
      window.ratings = [{ rating: 5, comment: 'Great' }];
      window.transactions = [{ type: 'Deposit', amount: '+$50' }];
      refreshSnapshots();
    });

    document.getElementById('syncBridgeBtn').addEventListener('click', function () {
      if (window.AsmaraStoreLegacyBridge) {
        window.AsmaraStoreLegacyBridge.syncFromLegacyGlobals();
      }
      refreshSnapshots();
    });

    refreshSnapshots();
  </script>
</body>
</html>
